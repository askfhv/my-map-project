<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上财基层就业地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #ffffff; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; flex-direction: column; }

        .main-header { width: 100%; padding: 15px 0; text-align: center; border-bottom: 1px solid #f0f0f0; background: #fff; z-index: 20; }
        .main-header h1 { color: #d6292b; font-size: 1.5rem; font-weight: bold; }

        .map-container { flex-grow: 1; position: relative; width: 100%; overflow: hidden; }
        #china-map { width: 100%; height: 100%; }

        .logo-bar { position: absolute; top: 10px; left: 15px; z-index: 10; pointer-events: none; }
        .logo-bar img { height: 40px; opacity: 0.9; }

        .info-card {
            position: absolute;
            bottom: 20px; left: 20px; right: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            border-left: 5px solid #d6292b;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .region-name { font-size: 1.6rem; font-weight: bold; color: #d6292b; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        #regionData {
            font-size: 1rem;
            line-height: 1.8;
            color: #333;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .policy-item {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #eee;
        }
        .policy-item:last-child { border-bottom: none; }
        
        .policy-title-base { color: #d6292b; font-weight: bold; font-size: 1.05rem; display: inline-block; margin-bottom: 4px; }
        .policy-link { text-decoration: underline; cursor: pointer; }
        .policy-text { text-decoration: none; cursor: default; }
        .policy-desc { font-size: 0.9rem; color: #666; line-height: 1.5; }
        .policy-require { font-size: 0.85rem; color: #d6292b; margin-top: 5px; background: #fff5f5; padding: 4px 8px; border-radius: 4px; }

        #regionData::-webkit-scrollbar { width: 4px; }
        #regionData::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        #back-btn {
            position: absolute; top: 20px; right: 20px; z-index: 30;
            display: none; padding: 10px 20px; background: #d6292b;
            color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }

        /* --- 新增：定位中心按钮样式 --- */
        #reset-btn {
            position: absolute; top: 60px; left: 15px; z-index: 30;
            padding: 8px 12px; background: #fff; border: 1px solid #ccc;
            border-radius: 4px; cursor: pointer; font-size: 0.85rem;
            color: #333; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            font-weight: bold;
        }
        #reset-btn:hover { background: #f9f9f9; color: #d6292b; }

        .enter-sh-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 15px;
            background: #d6292b; color: white;
            border-radius: 4px; cursor: pointer;
            font-size: 0.9rem; font-weight: bold;
        }

        @media (min-width: 768px) {
            .main-header h1 { font-size: 2.2rem; }
            .info-card { width: 380px; right: auto; bottom: 40px; left: 40px; }
            .logo-bar img { height: 60px; }
            #reset-btn { top: 80px; left: 15px; } /* 电脑端稍微往下移一点，避开Logo */
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>

<body>
    <div class="main-header">
        <h1>上海财经大学基层就业地图</h1>
    </div>

    <div class="map-container">
        <div id="china-map"></div>
        <button id="back-btn">返回全国视图</button>
        <button id="reset-btn">🎯 回到地图中心</button>
        
        <div class="logo-bar">
            <img src="SufeLogo.png" alt="SUFE LOGO" onerror="this.style.display='none'">
        </div>
        <div class="info-card">
            <div class="region-name" id="selectedRegion">全国总览</div>
            <div id="regionData">点击各省份查看基层就业政策与选调录取详情</div>
        </div>
    </div>

    <script>
        (function () {
            const chart = echarts.init(document.getElementById('china-map'));
            const backBtn = document.getElementById('back-btn');
            const resetBtn = document.getElementById('reset-btn'); // 获取按钮
            let currentLevel = 'china';
            let currentSelected = null;

            const forbiddenRegions = ['台湾省', '香港特别行政区', '澳门特别行政区', '南海诸岛'];

            const geoCoordMap = {
                '北京市': [116.40, 39.90], '天津市': [117.19, 39.12], '上海市': [121.47, 31.23], '重庆市': [106.50, 29.53],
                '河北省': [114.50, 38.04], '山西省': [112.54, 37.85], '辽宁省': [123.42, 41.79], '吉林省': [125.32, 43.88],
                '黑龙江省': [126.64, 45.75], '江苏省': [118.76, 32.04], '浙江省': [120.15, 30.28], '安徽省': [117.28, 31.86],
                '福建省': [119.30, 26.07], '江西省': [115.89, 28.67], '山东省': [117.00, 36.67], '河南省': [113.66, 34.75],
                '湖北省': [114.29, 30.58], '湖南省': [112.98, 28.19], '广东省': [113.28, 23.12], '海南省': [110.33, 20.03],
                '四川省': [104.06, 30.67], '贵州省': [106.71, 26.57], '云南省': [102.71, 25.04], '陕西省': [108.94, 34.26],
                '甘肃省': [103.82, 36.05], '青海省': [101.77, 36.62], '内蒙古自治区': [111.67, 40.81],
                '广西壮族自治区': [108.32, 22.82], '西藏自治区': [91.11, 29.97], '宁夏回族自治区': [106.27, 38.46],
                '新疆维吾尔自治区': [87.61, 43.79],
                '浦东新区': [121.75, 31.15], '杨浦区': [121.52, 31.30], '闵行区': [121.40, 31.08], '徐汇区': [121.44, 31.17],
                '黄浦区': [121.48, 31.23], '静安区': [121.45, 31.28], '普陀区': [121.40, 31.25], '长宁区': [121.36, 31.21],
                '虹口区': [121.50, 31.27], '宝山区': [121.40, 31.38], '嘉定区': [121.23, 31.35], '松江区': [121.23, 31.04],
                '青浦区': [121.12, 31.15], '金山区': [121.30, 30.85], '奉贤区': [121.47, 30.92], '崇明区': [121.60, 31.62]
            };

            const zoomConfig = {
                '新疆维吾尔自治区': 2.2, '西藏自治区': 2.3, '内蒙古自治区': 2.5, '青海省': 3.5,
                '四川省': 4.5, '黑龙江省': 4.5, '甘肃省': 5, '云南省': 5.5,
                '广东省': 7, '湖南省': 7, '湖北省': 7, '河南省': 7, '山东省': 7, '江西省': 7,
                '福建省': 7, '安徽省': 7, '浙江省': 7, '江苏省': 8, '河北省': 7, '山西省': 7,
                '辽宁省': 7, '吉林省': 7, '广西壮族自治区': 7, '贵州省': 7, '陕西省': 7,
                '北京市': 12, '天津市': 12, '上海市': 15, '重庆市': 8, '海南省': 10,
                '宁夏回族自治区': 10,
                '浦东新区': 3, '崇明区': 3.5, '金山区': 5, '奉贤区': 5.5, '青浦区': 5.5, '松江区': 5.5,
                '嘉定区': 6, '宝山区': 6, '闵行区': 6,
                '杨浦区': 10, '虹口区': 12, '黄浦区': 12, '静安区': 10, '徐汇区': 10, '普陀区': 10, '长宁区': 10
            };

            const policyData = [
                {
                    name: '上海市',
                    policies: [
                        { title: '专项选调生', desc: '面向高水平大学优秀应届毕业生。', url: '#' },
                        { title: '“三支一扶”', desc: '基层支教、支农、支医等招募计划。', url: '#' }
                    ]
                },
                {
                    name: '江苏省',
                    policies: [
                        { title: '名校优选', desc: '每年十月中旬开展，要求较高，对我校有专业限制', url: 'https://www.jszzb.gov.cn/tzgg/art/2025/art_311f52a18ad535b3b8642c677450bab1.html',require:'中共党员（含预备），学生干部，综合性表彰需全满足' },
                        { title: '常规选调(乡镇)', desc: '每年十月中旬开展，要求较名校优选相比较低，对我校无专业限制', url: 'https://www.jszzb.gov.cn/tzgg/art/2025/art_311f52a18ad535b3b8642c677450bab1.html' ,require:'中共党员（含预备），学生干部，综合性表彰需全满足，但要求降低'},
                        { title: '省考(公务员)', desc: '每年十月末开展，部分岗位存在生源地限制', url: 'https://www.jszzb.gov.cn/tzgg/art/2025/art_0b70c8f3fb4f2c5d852180928e946634.html'},
                        { title: '御风解读', desc: '解析江苏省选调近几年的报考条件及相关政策', url: 'https://mp.weixin.qq.com/s/6mEbElaF7bjK4xarddlLHQ' },
                        { title: '补充说明/备注', desc :'11111测试用'},
                        { title: '测试测试测试', desc :'故障机器人天下第一强',require:'所有人打开杀戮尖塔选择故障机器人'}
                    ]
                }
            ];

            function switchMap(mapName, url, isChina) {
                fetch(url).then(res => res.json()).then(geoJson => {
                    echarts.registerMap(mapName, geoJson);  
                    
                    const silentStyles = forbiddenRegions.map(name => ({
                        name: name,
                        itemStyle: { areaColor: '#f2f2f2' },
                        emphasis: { disabled: true }, 
                        label: { show: false },
                        select: { disabled: true } 
                    }));

                    const option = {
                        tooltip: { 
                            trigger: 'item', 
                            formatter: (params) => forbiddenRegions.includes(params.name) ? null : params.name 
                        },
                        series: [{
                            name: 'map', 
                            type: 'map', 
                            map: mapName, 
                            roam: true,
                            scaleLimit: {
                                min: isChina ? 1 : 0.8, 
                                max: 15
                            },
                            layoutCenter: ['50%', '50%'], 
                            layoutSize: '90%', 
                            zoom: isChina ? 1.2 : 1, 
                            center: null,
                            label: { show: true, fontSize: 10 },
                            itemStyle: { areaColor: '#f9f9f9', borderColor: '#ccc' },
                            emphasis: { itemStyle: { areaColor: '#ffe4e1' } },
                            select: { itemStyle: { areaColor: '#0052d9' }, label: { color: '#fff' } },
                            selectedMode: 'single',
                            data: isChina ? policyData : [],
                            regions: silentStyles
                        }]
                    };
                    chart.setOption(option, true);
                });
            }

            switchMap('china', './china.json', true);

            // --- 新增：定位中心按钮点击事件 ---
            resetBtn.onclick = function() {
                // 将地图 center 置空（恢复 layoutCenter 默认值），zoom 恢复初始值
                chart.setOption({
                    series: [{
                        center: null, 
                        zoom: currentLevel === 'china' ? 1.2 : 1
                    }]
                });
                // 同时重置文字卡片
                currentSelected = null;
                document.getElementById('selectedRegion').innerText = currentLevel === 'china' ? "全国总览" : "上海市总览";
                document.getElementById('regionData').innerText = "请点击区域查看详情";
                // 取消所有地图选中状态
                chart.dispatchAction({ type: 'unSelect' });
            };

            chart.on('click', function (params) {
                const name = params.name;

                if (forbiddenRegions.includes(name)) {
                    chart.dispatchAction({ type: 'unSelect', name: name }); 
                    return; 
                }

                if (currentSelected === name) {
                    chart.setOption({ series: [{ center: null, zoom: currentLevel === 'china' ? 1.2 : 1 }] });
                    currentSelected = null;
                    document.getElementById('selectedRegion').innerText = currentLevel === 'china' ? "全国总览" : "上海市总览";
                    document.getElementById('regionData').innerText = "请点击区域查看详情";
                } else {
                    currentSelected = name;
                    showInfoCard(name);
                    const pos = geoCoordMap[name];
                    const zoom = zoomConfig[name] || 6;
                    chart.setOption({
                        series: [{
                            center: pos || null,
                            zoom: zoom,
                            transition: ['center', 'zoom']
                        }]
                    });
                }
            });

            function showInfoCard(regionName) {
                const match = policyData.find(p => p.name === regionName);
                const titleEl = document.getElementById('selectedRegion');
                const contentEl = document.getElementById('regionData');
                titleEl.innerText = regionName;

                if (match) {
                    let html = '';
                    if (match.policies && match.policies.length > 0) {
                        match.policies.forEach(item => {
                            const hasUrl = item.url && item.url !== '#';
                            html += `
                                <div class="policy-item">
                                    ${hasUrl ? 
                                        `<a href="${item.url}" target="_blank" class="policy-title-base policy-link">${item.title}</a>` : 
                                        `<div class="policy-title-base policy-text">${item.title}</div>`
                                    }
                                    <div class="policy-desc">${item.desc}</div>
                                    ${item.require ? `<div class="policy-require"><strong>硬性要求：</strong>${item.require}</div>` : ''}
                                </div>
                            `;
                        });
                    } else {
                        html += `<strong>政策：</strong>${match.policy || '暂无数据'}<br><strong>详情：</strong>${match.info || '暂无数据'}<br>`;
                    }

                    if (regionName === '上海市' && currentLevel === 'china') {
                        html += `<br><div class="enter-sh-btn" id="enterSH">进入上海市详细地图 →</div>`;
                    }
                    contentEl.innerHTML = html;

                    if (document.getElementById('enterSH')) {
                        document.getElementById('enterSH').onclick = function () {
                            currentLevel = 'shanghai';
                            backBtn.style.display = 'block';
                            currentSelected = null;
                            switchMap('shanghai', './shanghai.json', false);
                            document.getElementById('selectedRegion').innerText = "上海市总览";
                            document.getElementById('regionData').innerText = "已进入上海详细地图，请点击各区。";
                        };
                    }
                } else {
                    contentEl.innerText = "数据整理中，敬请期待...";
                }
            }

            backBtn.onclick = function () {
                currentLevel = 'china';
                currentSelected = null;
                backBtn.style.display = 'none';
                switchMap('china', './china.json', true);
                document.getElementById('selectedRegion').innerText = "全国总览";
                document.getElementById('regionData').innerText = "请点击省份查看详情";
            };

            window.addEventListener('resize', () => chart.resize());
        })();
    </script>
</body>
</html>
